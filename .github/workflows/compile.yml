name: Compile ESP32 sketch

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create config.h from secrets
        run: |
          cat > config.h << EOF
          #ifndef CONFIG_H
          #define CONFIG_H
          #define WIFI_SSID     "${{ secrets.WIFI_SSID }}"
          #define WIFI_PASSWORD "${{ secrets.WIFI_PASSWORD }}"
          #endif
          EOF

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Configure arduino-cli
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.17

      - name: Install libraries
        run: |
          arduino-cli lib install "ESP32-audioI2S-master@2.0.0"

      - name: Compile sketch and export binaries
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32 --export-binaries .
          ls -la build/esp32.esp32.esp32/

      - name: Install esptool
        run: |
          pip install esptool

      - name: Merge into single flashable binary
        run: |
          cd build/esp32.esp32.esp32
          BOOTLOADER=$(ls *.bootloader.bin)
          PARTITIONS=$(ls *.partitions.bin)
          APP=$(ls *.ino.bin)
          echo "bootloader=$BOOTLOADER partitions=$PARTITIONS app=$APP"
          esptool.py --chip esp32 merge_bin -o merged-firmware.bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            0x1000 "$BOOTLOADER" \
            0x8000 "$PARTITIONS" \
            0x10000 "$APP"

      - name: Upload merged firmware as artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-web-radio-dac-firmware
          path: build/esp32.esp32.esp32/merged-firmware.bin
